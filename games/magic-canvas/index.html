<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Magic Canvas — Kids Games</title>
  <link rel="stylesheet" href="../../css/style.css?v=20260718211045">
  <link rel="stylesheet" href="style.css?v=20260718211045">
</head>
<body>
  <div class="game-header">
    <button class="game-header__btn" id="back-btn" aria-label="Back to games">
      <svg><use href="../../assets/svg/icons.svg#icon-back"/></svg>
    </button>
    <div class="game-header__btns">
      <button class="game-header__btn" id="fullscreen-btn" aria-label="Fullscreen">
        <span style="font-size:1.3rem">⛶</span>
      </button>
      <button class="game-header__btn" id="help-btn" aria-label="Bantuan">
        <svg><use href="../../assets/svg/icons.svg#icon-help"/></svg>
      </button>
      <button class="game-header__btn" id="sound-toggle" aria-label="Toggle sound">
        <svg><use href="../../assets/svg/icons.svg#icon-sound-on"/></svg>
      </button>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="magic-hint" id="hint">Tap anywhere!</div>

  <div class="math-modal" id="math-modal">
    <div class="math-modal__box">
      <p class="math-modal__title">🔒 Parent Zone</p>
      <p class="math-modal__title" style="font-size:0.8rem;margin-bottom:8px">Jawab untuk masuk</p>
      <p class="math-modal__question" id="math-question">3 + 4 = ?</p>
      <input class="math-modal__input" id="math-answer" type="number" inputmode="numeric" autocomplete="off" placeholder="?" />
      <div class="math-modal__btns">
        <button class="math-modal__btn math-modal__btn--ok" id="math-submit">OK</button>
        <button class="math-modal__btn math-modal__btn--cancel" id="math-cancel">✗</button>
      </div>
    </div>
  </div>

  <div class="help-modal" id="help-modal">
    <div class="help-modal__box">
      <div class="help-modal__title">❓ Cara Bermain</div>
      <div class="help-modal__steps">
        <div class="help-modal__step" style="animation-delay:0s">
          <span class="help-modal__step-icon">👆</span>
          <span class="help-modal__step-text">Tap di mana saja di layar untuk membuat bentuk warna-warni</span>
        </div>
        <div class="help-modal__step" style="animation-delay:0.12s">
          <span class="help-modal__step-icon">🔇</span>
          <span class="help-modal__step-text">Tekan ikon speaker untuk menghidupkan/mematikan suara</span>
        </div>
        <div class="help-modal__step" style="animation-delay:0.24s">
          <span class="help-modal__step-icon">🎨</span>
          <span class="help-modal__step-text">Setiap tap menghasilkan bentuk, warna, dan efek gerak yang berbeda</span>
        </div>
        <div class="help-modal__step" style="animation-delay:0.36s">
          <span class="help-modal__step-icon">⛶</span>
          <span class="help-modal__step-text">Tekan ⛶ untuk masuk mode layar penuh</span>
        </div>
      </div>
      <button class="help-modal__btn" id="help-close">Mengerti!</button>
    </div>
  </div>

  <script type="module">
    import { initSafeguards } from '../../js/safeguard.js';
    initSafeguards();
  </script>
  <script type="module" src="game.js?v=20260718211045"></script>
</body>
</html>
