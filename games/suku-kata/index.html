<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Suku Kata — Kids Games</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-header">
    <a href="../../index.html" class="game-header__btn" aria-label="Back to games">
      <svg><use href="../../assets/svg/icons.svg#icon-back"/></svg>
    </a>
    <div class="game-header__btns">
      <button class="game-header__btn" id="sound-toggle" aria-label="Toggle sound">
        <span class="suku-header__icon" style="font-size:1.3rem">🔊</span>
      </button>
      <button class="game-header__btn" id="fullscreen-btn" aria-label="Fullscreen">
        <span style="font-size:1.3rem">⛶</span>
      </button>
      <button class="game-header__btn" id="settings-btn" aria-label="Settings">
        <span style="font-size:1.3rem">🔒</span>
      </button>
    </div>
  </div>

  <div class="suku-wrapper">
    <div class="mode-indicator" id="mode-indicator">Acak</div>
    <div class="suku-grid" id="grid"></div>
    <div class="suku-nav" id="nav">
      <button class="suku-nav__arrow" id="prev">‹</button>
      <div class="suku-nav__dots" id="dots"></div>
      <button class="suku-nav__arrow" id="next">›</button>
    </div>
  </div>

  <button class="shuffle-btn" id="shuffle-btn">🔄 Acak</button>

  <div class="math-modal" id="math-modal">
    <div class="math-modal__box">
      <p class="math-modal__title">🔒 Parent Zone</p>
      <p class="math-modal__title" style="font-size:0.8rem;margin-bottom:8px">Solve to enter settings</p>
      <p class="math-modal__question" id="math-question">3 + 4 = ?</p>
      <input class="math-modal__input" id="math-answer" type="number" inputmode="numeric" autocomplete="off" placeholder="?" />
      <div class="math-modal__btns">
        <button class="math-modal__btn math-modal__btn--ok" id="math-submit">OK</button>
        <button class="math-modal__btn math-modal__btn--cancel" id="math-cancel">✗</button>
      </div>
    </div>
  </div>

  <div class="settings-panel" id="settings-panel">
    <div class="settings-panel__box">
      <div class="settings-panel__title">⚙️ Game Settings</div>

      <div class="settings-panel__label">Mode:</div>
      <div class="settings-panel__mode">
        <label><input type="radio" name="mode" value="random" checked /> 🔀 Acak (Random)</label>
        <label><input type="radio" name="mode" value="inorder" /> 🔤 Urut (In Order)</label>
        <label><input type="radio" name="mode" value="parent" /> 👨‍👩‍👧‍👦 By Parent</label>
      </div>

      <div class="settings-panel__label">Syllables:</div>
      <textarea class="settings-panel__textarea" id="parent-input" placeholder="ba be bi bo bu pa pe pi po pu"></textarea>
      <div class="settings-panel__hint">Separate with spaces, commas, or new lines</div>

      <div class="settings-panel__btns">
        <button class="settings-panel__btn settings-panel__btn--apply" id="settings-apply">Apply</button>
        <button class="settings-panel__btn settings-panel__btn--cancel" id="settings-cancel">✗</button>
      </div>
    </div>
  </div>

  <div class="celebration-overlay" id="celebration">
    <div class="celebration-overlay__text">
      <span class="celebration-overlay__emoji">🎉🌟🎉</span>
      Hebat!
    </div>
  </div>

  <div class="ios-fullscreen-hint" id="ios-hint">
    <div class="ios-fullscreen-hint__box">
      <div class="ios-fullscreen-hint__icon">📱</div>
      <div class="ios-fullscreen-hint__title">Fullscreen</div>
      <div class="ios-fullscreen-hint__text">For the best experience, tap the Share icon and select "Add to Home Screen".</div>
      <button class="ios-fullscreen-hint__btn" id="ios-hint-btn">Got it!</button>
    </div>
  </div>

  <script type="module">
    import { initSafeguards } from '../../js/safeguard.js';
    initSafeguards();
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
