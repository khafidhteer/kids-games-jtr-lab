<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Animal Soundboard — Kids Games</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-header">
    <a href="../../index.html" class="game-header__btn" aria-label="Back to games">
      <svg><use href="../../assets/svg/icons.svg#icon-back"/></svg>
    </a>
    <div class="game-header__btns">
      <button class="lang-toggle" id="lang-en" aria-label="English">
        <span class="lang-toggle__flag">🇬🇧</span>
        <span class="lang-toggle__label">English</span>
      </button>
      <button class="lang-toggle" id="lang-id" aria-label="Bahasa Indonesia">
        <span class="lang-toggle__flag">🇮🇩</span>
        <span class="lang-toggle__label">B. Indo</span>
      </button>
    </div>
  </div>

  <div class="soundboard" id="soundboard"></div>

  <script type="module">
    import { initSafeguards } from '../../js/safeguard.js';
    initSafeguards();
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
